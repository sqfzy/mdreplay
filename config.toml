# mdreplay —— 录制行情回放(多币多所混合)→ gconf v2 shm

[input]
format = "csv"              # csv | json(csv 先实现):决定文件解析器
dir    = "datas"            # 录制根目录;扫该目录全部 *.book.csv / *.trade.csv(表头驱动)

[replay]
realtime = 1.0              # 0~1:值=有多实时。实际延迟 = 真实事件间隔 × realtime
                            #   1 = 完全原速(默认);0.5 = 2× 实时;0 = 尽快(纯逻辑序、完全可复现)
start = ""                  # 回放时间窗起(留空=最早),例 "2026-06-23 09:00:00"(UTC),可跨天
end   = ""                  # 回放时间窗止(留空=最晚),闭区间

[output]                    # 单入单出:一次只回放一种。要 book 和 trade 都喂,跑两遍。
format = "book"             # book | trade —— 决定读 *.<format>.csv + 写哪种段
shm    = "/shm_bybit_lin_book_v2"
create = true               # 生产者建段;false=attach 既有

# 注:精度不在此规定 —— mdreplay 沿用输入数据本身的小数位推出 price_scale/qty_scale,
#     逐记录写进 shm(见 src/fixed.hpp)。

[log]
level        = "info"       # trace | debug | info | warn | error
progress_sec = 5            # 每 N 秒打一次进度(已发条数 / 当前 ts / lapped 计数)
