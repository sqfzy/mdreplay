# mdreplay —— 单入单出记录回放(任意格式 → shm/csv/json)

[input]
format = "csv"             # csv | json | auto —— 输入格式;auto=扫目录自动识别(仅一种格式时;并存则报错请指定)
dir    = "datas"           # 输入目录;扫 *.<kind>.<format>(如 *.book.csv)
kind   = "book"            # book | trade —— 一次只回放一种;要两者跑两遍
                           # book 档数(1 或 5)由输入表头/键自动识别,无需配置

[replay]
realtime = 1.0             # 0~1:值=有多实时。1=原速(默认);0.5=2× 实时;0=尽快(可复现)
start = ""                 # 时间窗起(留空=最早),例 "2026-06-23 09:00:00"(UTC),可跨天
end   = ""                 # 时间窗止(留空=最晚),闭区间

# 时序锚(跨进程同钟):把数据时刻 data_ts 钉到墙钟 system_ts,任意 ts 的播出墙钟由 realtime 线性推算。
# 注释掉 / 不写 = 不同步(默认:各锚首事件、实时从~现在起播,单进程零负担)。
# 写了(两端齐)= 启用:book / trade / 多 venue 多进程填**同一个 anchor + 同 realtime** → 同钟。
# 两端都收 UTC datetime("YYYY-MM-DD HH:MM:SS")或裸 epoch ns;system_ts 建议取未来,免初始 burst。
# anchor = { data_ts = "2026-06-23 08:00:00", system_ts = "2026-06-25 14:00:00" }

[output]                            # 输出恒为 gconf v1.2.2 shm 段(book→BookTickBoard、trade→TradeRing)
path   = "/shm_bybit_lin_book_tick" # shm 段名(/开头)
create = true                       # 建段(O_TRUNC 幂等)/ false=attach

# 注:精度不在此规定 —— mdreplay 沿用输入数据本身的小数位推出 price_scale/qty_scale。

[log]
level        = "info"      # trace | debug | info | warn | error
progress_sec = 5
