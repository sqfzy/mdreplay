# mdreplay —— 多路同步回放(任意格式 → shm)。每路 (input→output) 一个 [[replays]],共享一条全局时钟。

realtime = 1.0             # 全局节奏 0~1:值=有多实时。1=原速(默认);0.5=2× 实时;0=尽快(可复现)

# 手动数据原点(可选):把该数据时刻当 t0、对齐到回放开始的墙钟 now;留空/省略=自动锚首个被回放事件。
# 收 UTC datetime("YYYY-MM-DD HH:MM:SS")或裸 epoch ns。realtime=0(尽快)下无意义。
# init_ts = "2026-06-23 09:00:00"

# 一路回放单元:input(format/dir/kind)→ output(path/create),带本路独立时间窗 start/end。
# 多路 = 多个 [[replays]];N 路全局归并成一条流、共享上面 realtime/init_ts 一条时钟,各写各段。
# book 档数({1,5,10,15,20,25})由输入表头/键自动识别(depth==1→BookTickBoard、>1→DepthBoard)。
[[replays]]
input  = { format = "csv", dir = "datas", kind = "book" }      # format: csv|json|auto;kind: book|trade
output = { path = "/shm_bybit_lin_book_tick_v2", create = true }  # 段名(/开头)+ 建段/attach。v2 BookTickBoard 走 _v2 后缀(gconf v1.2.2 约定:无后缀=旧 v1 段)
start  = ""                # 本路时间窗起(留空=最早),例 "2026-06-23 09:00:00"(UTC),可跨天
end    = ""                # 本路时间窗止(留空=最晚),闭区间

# 再加一路就再写一个 [[replays]](book 与 trade 同进程同钟喂下游 = 两路;段名须两两不同):
# [[replays]]
# input  = { format = "csv", dir = "datas", kind = "trade" }
# output = { path = "/shm_bybit_lin_trade", create = true }
# start  = ""
# end    = ""

[log]
level        = "info"      # trace | debug | info | warn | error
progress_sec = 5
